name: CI/CD Music Platform

# Конвейер запускается только при пуше в ветку main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем код репозитория на сервера GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Логинимся на Docker Hub, используя наши секреты
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Собираем Docker-образ и отправляем его на Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # Указываем, где лежит Dockerfile
          context: ./backend
          push: true
          
          tags: ${{ secrets.DOCKER_USERNAME }}/vxga-music:latest

      # 4. Запускаем Ansible-плейбук для деплоя на реальный сервер
      - name: Run Ansible Playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          # Путь к плейбуку в репозитории
          playbook: ansible/deploy.yml
          # inventory-файл с IP-адресом сервера
          inventory: ansible/inventory.ini
          # SSH-ключ для подключения к серверу
          key: ${{ secrets.SSH_KEY }}
          options: |
            --user ubuntu
            --become
          vars: |
            docker_hub_username: ${{ secrets.DOCKER_USERNAME }}