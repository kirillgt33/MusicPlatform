name: CI/CD Music Platform

# Конвейер запускается только при пуше в ветку main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем код репозитория на сервера GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Логинимся на Docker Hub, используя наши секреты
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Собираем Docker-образ и отправляем его на Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # Указываем, где лежит Dockerfile
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vxga-music:latest

      # 4. Запускаем Ansible-плейбук
      - name: Run Ansible Playbook
        uses: dawidd6/action-ansible-playbook@v2
        # Передаем переменные окружения, которые Ansible считает внутри инвентаря
        env:
          DEPLOY_HOST: ${{ secrets.SERVER_IP }}
          DEPLOY_USER: ${{ secrets.SERVER_USER }}
          ANSIBLE_HOST_KEY_CHECKING: 'false' # Отключаем проверку хоста, чтобы экшен не зависал
        with:
          playbook: ansible/deploy.yml
          # Указываем путь к файлу инвентаря в репозитории
          inventory: ansible/inventory.ini 
          # Передаем приватный SSH-ключ
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Передаем дополнительные опции (убрали жестко зашитого юзера ubuntu)
          options: |
            --become
            --extra-vars "docker_hub_username=${{ secrets.DOCKER_USERNAME }}"