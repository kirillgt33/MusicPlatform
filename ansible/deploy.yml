---
- name: Deploy Music Portfolio Application
  hosts: all
  become: yes  # Выполнять команды от имени root (sudo)

  tasks:
    - name: Update apt cache and install prerequisites
      apt:
        update_cache: yes
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - git
        state: present

    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable
        state: present

    - name: Install Docker CE
      apt:
        name: docker-ce
        state: present
        update_cache: yes

    - name: Ensure Docker group exists
      group:
        name: docker
        state: present

    - name: Add current deployment user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Create app directory for music files
      file:
        path: "/home/{{ ansible_user }}/MusicPlatform/tracks"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    # Создаем домашнюю папку проекта, если её ещё нет
    - name: Ensure project directory exists
      file:
        path: "/home/{{ ansible_user }}/MusicPlatform"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy docker-compose.yml to server
      copy:
        src: ../docker-compose.yml
        dest: "/home/{{ ansible_user }}/MusicPlatform/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
    
    - name: Ensure nginx directory exists on server
      file:
        path: "/home/{{ ansible_user }}/MusicPlatform/nginx"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy nginx.conf to server
      copy:
        src: ../nginx/nginx.conf
        dest: "/home/{{ ansible_user }}/MusicPlatform/nginx/nginx.conf"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    # Создаем файл .env на сервере
    - name: Create .env file for Docker Compose
      lineinfile:
        path: "/home/{{ ansible_user }}/MusicPlatform/.env"
        line: "DOCKER_USERNAME={{ docker_hub_username }}"
        create: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Pull latest images from Docker Hub
      shell:
        cmd: docker compose pull
        chdir: "/home/{{ ansible_user }}/MusicPlatform"

    - name: Restart application container
      shell:
        cmd: docker compose up -d --force-recreate
        chdir: "/home/{{ ansible_user }}/MusicPlatform"