<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXGA | Music</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>VXGA.AUDIO</h1>
            <p class="subtitle">RMX Archive</p>
            <div class="line"></div>
        </header>

        <main class="player-section">
            {% if tracks %}
                {% for track in tracks %}
                <div class="track-card">
                    <img class="track-cover" src="{{ url_for('get_cover', track_name=track) }}" alt="" onerror="this.style.display='none';">
                    
                    <div class="track-content">
                        <div class="track-info">
                            <span class="track-number">0{{ loop.index }}</span>
                            <span class="track-title">{{ track.replace('.mp3', '').replace('_', ' ').upper() }}</span>
                        </div>
                        <audio controls controlsList="nodownload">
                            <source src="{{ url_for('static', filename='music/' + track) }}" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <p class="no-tracks">В папке static/music пока нет треков. Закинь файлы .mp3</p>
            {% endif %}
        </main>

        <footer>
            <p>&copy; 2026 VXGA. Built with Flask & Automated via DevOps</p>
        </footer>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    // === ЛОГИКА ОСТАНОВКИ ДРУГИХ ТРЕКОВ  ===
    document.addEventListener('play', function(e) {
        const audios = document.getElementsByTagName('audio');
        for (let i = 0, len = audios.length; i < len; i++) {
            if (audios[i] !== e.target) {
                audios[i].pause();
            }
        }
    }, true);

    // === ЛОГИКА АВТОПЕРЕКЛЮЧЕНИЯ НА СЛЕДУЮЩИЙ ТРЕК ===
    const audioPlayers = document.querySelectorAll('.track-card audio');

    audioPlayers.forEach((audio) => {
        audio.addEventListener('ended', (event) => {
            // Находим карточку текущего трека
            const currentCard = event.target.closest('.track-card');
            
            if (currentCard) {
                // Ищем следующую карточку в списке
                const nextCard = currentCard.nextElementSibling;
                
                // Проверяем, что это карточка и она существует
                if (nextCard && nextCard.classList.contains('track-card')) {
                    const nextAudio = nextCard.querySelector('audio');
                    
                    if (nextAudio) {
                        // Запускаем следующий трек
                        nextAudio.play().catch(error => {
                            console.log("Автовоспроизведение прервано браузером:", error);
                        });
                    }
                } else {
                    console.log("Плейлист окончен.");
                }
            }
        });
    });
});
</script>
</body>
</html>
